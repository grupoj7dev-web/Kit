name: Deploy Kit

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload files (development)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "./*"
          target: ${{ secrets.APP_PATH }}
          overwrite: true
          timeout: 2m

      - name: Deploy via SSH (development)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 2m
          script: |
            set -e
            cd "${{ secrets.APP_PATH }}"
            echo "${{ secrets.ENV_FILE_CONTENT_B64 }}" | base64 -d > .env.local
            docker compose down --remove-orphans || true
            DRIVER="$(docker network inspect traefik-public -f '{{.Driver}}' 2>/dev/null || true)"
            if [ "$DRIVER" != "overlay" ]; then
              docker network rm traefik-public >/dev/null 2>&1 || true
              docker network create --driver overlay --attachable traefik-public >/dev/null 2>&1 || true
            fi
            docker compose up -d --build --remove-orphans

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload files (production)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "./*"
          target: ${{ secrets.APP_PATH }}
          overwrite: true
          timeout: 2m

      - name: Deploy via SSH (production)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 2m
          script: |
            set -e
            cd "${{ secrets.APP_PATH }}"
            echo "${{ secrets.ENV_FILE_CONTENT_B64 }}" | base64 -d > .env.local
            docker compose down --remove-orphans || true
            DRIVER="$(docker network inspect traefik-public -f '{{.Driver}}' 2>/dev/null || true)"
            if [ "$DRIVER" != "overlay" ]; then
              docker network rm traefik-public >/dev/null 2>&1 || true
              docker network create --driver overlay --attachable traefik-public >/dev/null 2>&1 || true
            fi
            docker compose up -d --build --remove-orphans
